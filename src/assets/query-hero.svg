<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-label="A search bar parses into an abstract syntax tree that fans out into SQL, JSON, and Go predicate targets.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1B1A19"/>
      <stop offset="100%" stop-color="#131211"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5853CF"/>
      <stop offset="100%" stop-color="#8884E5"/>
    </linearGradient>
    <linearGradient id="coral" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6B5B"/>
      <stop offset="100%" stop-color="#E84D3C"/>
    </linearGradient>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#2B2A28" stroke-width="0.5" opacity="0.6"/>
    </pattern>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#B7B4AD"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="1200" height="360" fill="url(#bg)"/>
  <rect width="1200" height="360" fill="url(#grid)"/>

  <!-- search bar -->
  <g transform="translate(60 140)">
    <rect width="280" height="80" rx="14" fill="#2B2A28" stroke="#4F4D48" stroke-width="1"/>
    <circle cx="32" cy="40" r="10" fill="none" stroke="#8884E5" stroke-width="2"/>
    <line x1="40" y1="48" x2="48" y2="56" stroke="#8884E5" stroke-width="2" stroke-linecap="round"/>
    <text x="62" y="36" font-family="ui-monospace, 'SFMono-Regular', Menlo, monospace" font-size="13" fill="#F5F2EC">state=draft AND</text>
    <text x="62" y="56" font-family="ui-monospace, 'SFMono-Regular', Menlo, monospace" font-size="13" fill="#F5F2EC">total&gt;=50000*1.1</text>
    <rect x="244" y="38" width="2" height="14" fill="#8884E5">
      <animate attributeName="opacity" values="0;1;1;0" dur="1.1s" repeatCount="indefinite"/>
    </rect>
    <text x="0" y="-12" font-family="system-ui, -apple-system, Inter, sans-serif" font-size="11" font-weight="500" fill="#B7B4AD" letter-spacing="1.5">QUERY</text>
  </g>

  <!-- arrow search -> ast -->
  <line x1="360" y1="180" x2="430" y2="180" stroke="#B7B4AD" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="395" y="170" text-anchor="middle" font-family="system-ui, -apple-system, Inter, sans-serif" font-size="10" fill="#8884E5" font-weight="600" letter-spacing="0.5">parse</text>

  <!-- AST tree -->
  <g transform="translate(460 60)" filter="url(#glow)">
    <text x="120" y="6" text-anchor="middle" font-family="system-ui, -apple-system, Inter, sans-serif" font-size="11" font-weight="500" fill="#B7B4AD" letter-spacing="1.5">AST</text>
    <!-- edges -->
    <line x1="120" y1="56" x2="60" y2="118" stroke="#5853CF" stroke-width="1.2"/>
    <line x1="120" y1="56" x2="180" y2="118" stroke="#5853CF" stroke-width="1.2"/>
    <line x1="60" y1="148" x2="20" y2="210" stroke="#5853CF" stroke-width="1.2"/>
    <line x1="60" y1="148" x2="100" y2="210" stroke="#5853CF" stroke-width="1.2"/>
    <line x1="180" y1="148" x2="140" y2="210" stroke="#5853CF" stroke-width="1.2"/>
    <line x1="180" y1="148" x2="220" y2="210" stroke="#5853CF" stroke-width="1.2"/>
    <!-- root -->
    <rect x="92" y="32" width="56" height="28" rx="6" fill="url(#accent)"/>
    <text x="120" y="50" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="11" font-weight="700" fill="#F5F2EC">AND</text>
    <!-- left child -->
    <rect x="32" y="124" width="56" height="28" rx="6" fill="#2B2A28" stroke="#5853CF" stroke-width="1"/>
    <text x="60" y="142" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#F5F2EC">=</text>
    <!-- right child -->
    <rect x="152" y="124" width="56" height="28" rx="6" fill="#2B2A28" stroke="#5853CF" stroke-width="1"/>
    <text x="180" y="142" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#F5F2EC">&gt;=</text>
    <!-- leaves -->
    <rect x="0" y="216" width="40" height="22" rx="5" fill="#1B1A19" stroke="#4F4D48"/>
    <text x="20" y="232" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="9" fill="#B7B4AD">state</text>
    <rect x="80" y="216" width="40" height="22" rx="5" fill="#1B1A19" stroke="#4F4D48"/>
    <text x="100" y="232" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="9" fill="#B7B4AD">draft</text>
    <rect x="120" y="216" width="40" height="22" rx="5" fill="#1B1A19" stroke="#4F4D48"/>
    <text x="140" y="232" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="9" fill="#B7B4AD">total</text>
    <rect x="200" y="216" width="40" height="22" rx="5" fill="#1B1A19" stroke="#4F4D48"/>
    <text x="220" y="232" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="9" fill="#B7B4AD">*</text>
  </g>

  <!-- fan-out arrows -->
  <path d="M 720 180 Q 800 100 880 80" stroke="#B7B4AD" stroke-width="1.4" fill="none" marker-end="url(#arrow)"/>
  <path d="M 720 180 L 880 180" stroke="#B7B4AD" stroke-width="1.4" fill="none" marker-end="url(#arrow)"/>
  <path d="M 720 180 Q 800 260 880 280" stroke="#B7B4AD" stroke-width="1.4" fill="none" marker-end="url(#arrow)"/>
  <text x="800" y="155" text-anchor="middle" font-family="system-ui, -apple-system, Inter, sans-serif" font-size="10" fill="#FF6B5B" font-weight="600" letter-spacing="0.5">Visitor[T]</text>

  <!-- output: SQL -->
  <g transform="translate(900 50)">
    <rect width="240" height="68" rx="10" fill="#2B2A28" stroke="url(#coral)" stroke-width="1.2"/>
    <text x="14" y="22" font-family="system-ui, -apple-system, Inter, sans-serif" font-size="10" fill="#FF6B5B" font-weight="700" letter-spacing="1.5">SQL</text>
    <text x="14" y="44" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#F5F2EC">state = $1</text>
    <text x="14" y="58" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#F5F2EC">AND total &gt;= ($2 * $3)</text>
  </g>

  <!-- output: JSON -->
  <g transform="translate(900 150)">
    <rect width="240" height="68" rx="10" fill="#2B2A28" stroke="url(#coral)" stroke-width="1.2"/>
    <text x="14" y="22" font-family="system-ui, -apple-system, Inter, sans-serif" font-size="10" fill="#FF6B5B" font-weight="700" letter-spacing="1.5">JSON</text>
    <text x="14" y="44" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#F5F2EC">{ "op": "AND",</text>
    <text x="14" y="58" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#F5F2EC">  "left": { ... }, ... }</text>
  </g>

  <!-- output: predicate -->
  <g transform="translate(900 250)">
    <rect width="240" height="68" rx="10" fill="#2B2A28" stroke="url(#coral)" stroke-width="1.2"/>
    <text x="14" y="22" font-family="system-ui, -apple-system, Inter, sans-serif" font-size="10" fill="#FF6B5B" font-weight="700" letter-spacing="1.5">Go predicate</text>
    <text x="14" y="44" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#F5F2EC">func(r) bool {</text>
    <text x="14" y="58" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#F5F2EC">  return r.State == "draft" ...</text>
  </g>
</svg>
